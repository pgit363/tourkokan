name: Deploy

# Branch -> environment mapping:
#   test   -> Cloudflare Worker "tourkokan-test" (backend https://api-test.tourkokan.com)
#   master -> Cloudflare Worker "tourkokan"      (backend https://api.tourkokan.com, PRODUCTION)
#   dev    -> NOT deployed (local development only)
on:
  push:
    branches: [test, master]
  workflow_dispatch:

jobs:
  deploy-test:
    if: github.ref == 'refs/heads/test'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build (test env)
        run: npx opennextjs-cloudflare build
        env:
          NEXT_PUBLIC_API_URL: https://api-test.tourkokan.com
          NEXT_PUBLIC_FTP_PATH: https://tourkokan-412490161095-eu-north-1-an.s3.eu-north-1.amazonaws.com/
          NEXT_PUBLIC_GOOGLE_MAP_API_KEY: AIzaSyArluwc4abyz8Uxuwqh7WZxLWjRGGgV9K0
      - name: Deploy to Cloudflare (tourkokan-test)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: e56e1812faccec3009583f5067b53231
          wranglerVersion: "4.84.0"
          command: deploy --name tourkokan-test

  deploy-prod:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build (production env)
        run: npx opennextjs-cloudflare build
        env:
          NEXT_PUBLIC_API_URL: https://api.tourkokan.com
          NEXT_PUBLIC_FTP_PATH: https://tourkokan-412490161095-eu-north-1-an.s3.eu-north-1.amazonaws.com/
          NEXT_PUBLIC_GOOGLE_MAP_API_KEY: AIzaSyArluwc4abyz8Uxuwqh7WZxLWjRGGgV9K0
      - name: Deploy to Cloudflare (tourkokan)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: e56e1812faccec3009583f5067b53231
          wranglerVersion: "4.84.0"
          command: deploy
